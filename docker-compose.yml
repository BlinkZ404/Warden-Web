# Local dev/simulation database for Warden.
#
# In production this is Amazon Aurora PostgreSQL (Serverless v2); see docs/operations/go-live.md.
# The code talks to both through the same `node-postgres` driver and the same
# SQL; only DATABASE_URL changes. We use the `pgvector` image so the incident
# memory (pgvector similarity) works locally exactly as it does on Aurora.
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: warden-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: warden
      POSTGRES_PASSWORD: warden
      POSTGRES_DB: warden
    ports:
      # Host 5433 -> container 5432, so we don't collide with a local Postgres.
      - "5433:5432"
    volumes:
      - warden_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warden -d warden"]
      interval: 3s
      timeout: 3s
      retries: 30

volumes:
  warden_pgdata:
